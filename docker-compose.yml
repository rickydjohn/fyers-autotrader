version: "3.9"

networks:
  trading-net:
    driver: bridge

volumes:
  redis-data:
  fyers-tokens:
  timescale-data:

services:

  # ────────────────────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    container_name: trading-redis
    networks: [trading-net]
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - redis-data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trading-timescaledb
    networks: [trading-net]
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      TZ: Asia/Kolkata
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    shm_size: "256mb"

  # ────────────────────────────────────────────────────────────
  # Application Services
  # ────────────────────────────────────────────────────────────

  data-service:
    build: ./data-service
    container_name: trading-data
    networks: [trading-net]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://trading:trading@timescaledb:5432/trading
      - REDIS_URL=redis://redis:6379
      - TZ=Asia/Kolkata
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8003:8003"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  core-engine:
    build: ./core-engine
    container_name: trading-core
    networks: [trading-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
      net.ipv6.conf.default.disable_ipv6: 1
    volumes:
      - fyers-tokens:/app/tokens
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DATA_SERVICE_URL=http://data-service:8003
      - TZ=Asia/Kolkata
      - HTTPS_PROXY=http://${PROXY_USER}:${PROXY_PASSWORD}@${PROXY_IP}:${PROXY_PORT}
      - HTTP_PROXY=http://${PROXY_USER}:${PROXY_PASSWORD}@${PROXY_IP}:${PROXY_PORT}
      - https_proxy=http://${PROXY_USER}:${PROXY_PASSWORD}@${PROXY_IP}:${PROXY_PORT}
      - http_proxy=http://${PROXY_USER}:${PROXY_PASSWORD}@${PROXY_IP}:${PROXY_PORT}
      - NO_PROXY=data-service,api-service,simulation-engine,redis,timescaledb,host.docker.internal,localhost,127.0.0.1,hooks.slack.com,moneycontrol.com,indiatimes.com
      - no_proxy=data-service,api-service,simulation-engine,redis,timescaledb,host.docker.internal,localhost,127.0.0.1,hooks.slack.com,moneycontrol.com,indiatimes.com
    depends_on:
      redis:
        condition: service_healthy
      data-service:
        condition: service_healthy
    ports: ["8001:8001"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  simulation-engine:
    build: ./simulation-engine
    container_name: trading-sim
    networks: [trading-net]
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_SERVICE_URL=http://data-service:8003
      - CORE_ENGINE_URL=http://core-engine:8001
      - TZ=Asia/Kolkata
      # Risk-based position sizing (Stage 1). Overrides the .env value (was 85%,
      # which let a single position reach ~85% of the account → a -15% premium stop
      # could lose ~13% of the account in ONE trade — the dominant "lose big"
      # mechanism, found in a 194-trade resim 2026-06-04: every -₹9k..-₹11k single
      # loss came from notional size, not stop slippage). Capping notional at
      # 40%/trade: max single loss ~6% of account, P&L std -38% (2772→1722),
      # worst single loss -10822→-4069, worst-5 -45k→-20k, and net P&L actually
      # RISES (+10361→+13255) — the oversized bets carried no edge, only variance.
      # 40% is the floor that still affords 1 lot of the expensive options the
      # system buys (BANKNIFTY monthly ≈ ₹40k/lot = 40% of acct); going lower
      # silently blocks ~10-29% of trades, conflating sizing with selection.
      # Stage 2 (separate, deliberate): make option SELECTION prefer cheaper,
      # higher-gamma strikes so a tighter cap (≤25%) becomes possible without
      # starving the book — that's the path to truly-small losses on BANKNIFTY.
      - MAX_POSITION_SIZE_PCT=40
    depends_on:
      redis:
        condition: service_healthy
      data-service:
        condition: service_healthy
    ports: ["8002:8002"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-service:
    build: ./api-service
    container_name: trading-api
    networks: [trading-net]
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CORE_ENGINE_URL=http://core-engine:8001
      - SIM_ENGINE_URL=http://simulation-engine:8002
      - DATA_SERVICE_URL=http://data-service:8003
      - TZ=Asia/Kolkata
    depends_on:
      core-engine:
        condition: service_healthy
      simulation-engine:
        condition: service_healthy
      data-service:
        condition: service_healthy
    ports: ["8000:8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui-service:
    build: ./ui-service
    container_name: trading-ui
    networks: [trading-net]
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - TZ=Asia/Kolkata
    depends_on:
      api-service:
        condition: service_healthy
    ports: ["3000:80"]
    restart: unless-stopped
