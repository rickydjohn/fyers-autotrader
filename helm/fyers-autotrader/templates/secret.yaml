# Placeholder secret — populate via --set or an external secrets operator.
# In production use sealed-secrets, External Secrets Operator, or Vault.
# These values are intentionally empty; the containers reference them as optional.
apiVersion: v1
kind: Secret
metadata:
  name: fyers-autotrader-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fyers-autotrader.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep   # don't delete on chart uninstall
type: Opaque
# Override at deploy time:
#   --set secrets.FYERS_CLIENT_ID=xxxx
#   --set secrets.FYERS_SECRET_KEY=xxxx
#   --set secrets.FYERS_ACCESS_TOKEN=xxxx
stringData:
  FYERS_CLIENT_ID: {{ .Values.secrets.FYERS_CLIENT_ID | default "" | quote }}
  FYERS_SECRET_KEY: {{ .Values.secrets.FYERS_SECRET_KEY | default "" | quote }}
  FYERS_ACCESS_TOKEN: {{ .Values.secrets.FYERS_ACCESS_TOKEN | default "" | quote }}
